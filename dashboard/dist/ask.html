<html lang="en" class="dark" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Dialog | AI Chat</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet" vid="6">
    <script vid="7">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        dialogbg: '#0A0A0F',
                        dialogpanel: 'rgba(255, 255, 255, 0.02)',
                        dialogborder: 'rgba(255, 255, 255, 0.06)',
                        dialoghover: 'rgba(255, 255, 255, 0.04)',
                    }
                }
            }
        }
    </script>
    <style vid="8">
        body {
            background-color: #0A0A0F;
            color: #E5E7EB;
        }
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }
        .glass-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            transition: all 0.2s ease;
        }
        .glass-chip:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="min-h-screen relative font-sans antialiased overflow-hidden flex flex-col" vid="9">

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]" vid="10">
        <div class="ambient-glow top-[-10%] left-[20%] w-[60vw] h-[60vh] bg-indigo-600/10" vid="11"></div>
        <div class="ambient-glow bottom-[-10%] right-[10%] w-[50vw] h-[50vh] bg-purple-600/10" vid="12"></div>
    </div>

    <header class="sticky top-0 z-50 backdrop-blur-xl border-b border-white/[0.06] bg-[#0A0A0F]/80" vid="13">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between" vid="14">
            <div class="flex items-center gap-10" vid="15">
                <a href="/" class="flex items-center gap-2" vid="16">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" vid="17">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2" stroke-linejoin="round" vid="18"></path>
                        <path d="M2 17L12 22L22 17" stroke="white" stroke-opacity="0.3" stroke-width="2" stroke-linejoin="round" vid="19"></path>
                        <path d="M2 12L12 17L22 12" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linejoin="round" vid="20"></path>
                    </svg>
                    <span class="text-white font-semibold tracking-tight text-lg" vid="21">Dialog</span>
                </a>
                <nav class="hidden md:flex items-center gap-6" vid="22">
                    <a href="/"  class="text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors">Overview</a>
                    <a href="/logs"  class="text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors">Logs</a>
                    <a href="/journeys"  class="text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors">Journeys</a>
                    <a href="/errors"  class="text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors">Errors</a>
                    <a href="/ask"  class="text-sm font-medium text-white px-1 py-1 border-b-2 border-indigo-500">Ask AI</a>
                    <a href="/deployments"  class="text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors">Deploys</a>
                    <a href="/settings"  class="text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors">Settings</a>
                </nav>
            </div>
            <div class="flex items-center gap-4" vid="28">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white text-xs font-medium cursor-pointer" vid="29">JD</div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-6 -mt-16" vid="30">
        <div class="text-center max-w-2xl w-full" vid="31">
            <div class="mb-8 relative inline-flex" vid="32">
                <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500 to-purple-500 blur-2xl opacity-20" vid="33"></div>
                <div class="relative w-24 h-24 rounded-3xl bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center shadow-[0_0_40px_rgba(79,70,229,0.3)]" vid="34">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" vid="35">
                        <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vid="36"></path>
                        <path d="M8 9H16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4" vid="37"></path>
                        <path d="M8 13H13" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4" vid="38"></path>
                    </svg>
                    <div class="absolute -right-2 -top-2 flex gap-1" vid="39">
                        <div class="w-1 h-4 bg-white/40 rounded-full animate-[bounce_1.2s_infinite]" vid="40"></div>
                        <div class="w-1 h-6 bg-white/60 rounded-full animate-[bounce_1s_infinite]" vid="41"></div>
                        <div class="w-1 h-4 bg-white/40 rounded-full animate-[bounce_1.4s_infinite]" vid="42"></div>
                    </div>
                </div>
            </div>

            <h1 class="text-[28px] font-semibold text-white mb-3" vid="43">Ask Dialog</h1>
            <p class="text-gray-400 text-base mb-12" vid="44">Query your logs, troubleshoot errors, or ask about runtime performance in plain English.</p>

            <div class="grid grid-cols-2 gap-4" vid="45">
                <button class="glass-chip p-5 rounded-2xl flex items-center gap-4 text-left group" vid="46">
                    <div class="w-10 h-10 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 group-hover:bg-indigo-500 group-hover:text-white transition-all" vid="47">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" vid="48"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" vid="49"></path></svg>
                    </div>
                    <div vid="50">
                        <div class="text-sm font-medium text-white" vid="51">Why is latency spiking?</div>
                        <div class="text-xs text-gray-500 mt-1" vid="52">Analyze recent p95 trends</div>
                    </div>
                </button>
                <button class="glass-chip p-5 rounded-2xl flex items-center gap-4 text-left group" vid="53">
                    <div class="w-10 h-10 rounded-xl bg-rose-500/10 flex items-center justify-center text-rose-400 group-hover:bg-rose-500 group-hover:text-white transition-all" vid="54">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" vid="55"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" vid="56"></path></svg>
                    </div>
                    <div vid="57">
                        <div class="text-sm font-medium text-white" vid="58">Explain the last 5xx error</div>
                        <div class="text-xs text-gray-500 mt-1" vid="59">Root cause analysis of failures</div>
                    </div>
                </button>
                <button class="glass-chip p-5 rounded-2xl flex items-center gap-4 text-left group" vid="60">
                    <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 group-hover:bg-emerald-500 group-hover:text-white transition-all" vid="61">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" vid="62"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" vid="63"></path></svg>
                    </div>
                    <div vid="64">
                        <div class="text-sm font-medium text-white" vid="65">Summarize system health</div>
                        <div class="text-xs text-gray-500 mt-1" vid="66">Overview of all services</div>
                    </div>
                </button>
                <button class="glass-chip p-5 rounded-2xl flex items-center gap-4 text-left group" vid="67">
                    <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-400 group-hover:bg-amber-500 group-hover:text-white transition-all" vid="68">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" vid="69"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" vid="70"></path></svg>
                    </div>
                    <div vid="71">
                        <div class="text-sm font-medium text-white" vid="72">Find specific log patterns</div>
                        <div class="text-xs text-gray-500 mt-1" vid="73">Search through millions of rows</div>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <footer class="p-8 flex justify-center w-full" vid="74">
        <div class="max-w-4xl w-full relative" vid="75">
            <div class="input-glass rounded-2xl p-2 flex items-center gap-3 border border-white/10 shadow-2xl" vid="76">
                <div class="pl-4 text-indigo-400" vid="77">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" vid="78">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" vid="79"></path>
                    </svg>
                </div>
                <input type="text" placeholder="What's happening in my cluster right now?" class="flex-1 bg-transparent border-none outline-none text-white placeholder-gray-500 text-sm py-3" vid="80">
                <div class="flex items-center gap-2 pr-2" vid="81">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" vid="85"></path>
